<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Faceshion Try-On</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; }
      iframe { width: 100%; height: 100%; border: 0; display: block; background: #0a0a0a; }
      button {
        position: fixed; top: 12px; right: 12px; z-index: 3;
        width: 38px; height: 38px; border: 0; border-radius: 999px;
        background: rgba(255,255,255,.95); color: #111; cursor: pointer;
        font: 18px/1 system-ui, -apple-system, sans-serif;
        box-shadow: 0 4px 14px rgba(0,0,0,.35);
      }
    </style>
  </head>
  <body>
    <iframe id="faceshion-frame" allow="camera; microphone; clipboard-read; clipboard-write; fullscreen" allowfullscreen title="Faceshion Try-On"></iframe>
    <button id="close" type="button" aria-label="Kapat">×</button>
    <script src="overlay.js"></script>
  </body>
</html>
